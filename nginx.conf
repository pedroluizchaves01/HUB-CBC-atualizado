server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50M; # Aumentado para suportar uploads pesados de PDF/Excel no nosso projeto

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ^~ = se este prefixo casar, o nginx NÃO avalia as regex de location.
    # Sem isso, a regex de assets acima (~* \.(jpg|jpeg|png|...)$) vence o
    # prefixo /api/ e engole /api/uploads/foo.jpeg → try_files no disco do
    # frontend → 404 (o backend nunca é chamado). PDFs escapavam porque .pdf
    # não está na lista da regex; só imagens quebravam. Com ^~, todo /api/*
    # vai ao proxy independente da extensão. Ver também /ws/ e /health abaixo.
    location ^~ /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_url http://crm-api:3000; # Nosso backend roda na porta 3000
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location ^~ /ws/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_url http://crm-api:3000; # Nosso backend roda na porta 3000
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /health {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_url http://crm-api:3000; # Nosso backend roda na porta 3000
        proxy_pass $backend_url;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
