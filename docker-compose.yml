version: '3.8'

services:
  # Servidor Backend Express (com inteligência artificial Gemini, parser de planilhas/PDFs, etc.)
  crm-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cbc-crm-api
    # NÃO publicamos a porta 3000 no host: o backend é acessado apenas internamente pela rede
    # docker (o nginx do serviço 'frontend' faz proxy para crm-api:3000). O único entrypoint
    # público é o nginx na porta 80, evitando dupla exposição e conflito de portas no host.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # Obrigatórias em produção (ver DEPLOY.md) — configure no painel do Coolify ou em um .env:
      - DATABASE_URL=${DATABASE_URL} # connection string do Supabase/Postgres (pooler, porta 6543)
      - SESSION_SECRET=${SESSION_SECRET} # string aleatória longa (>= 32 chars) para assinar sessões
      # Opcionais:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-} # só se quiser o motor Gemini; o OCR interno funciona sem
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    restart: always

  # ---------------------------------------------------------------------------
  # Evolution API — gateway de WhatsApp (NÃO OFICIAL, via WhatsApp Web/Baileys).
  #
  # Fica num PROFILE opcional: `docker compose up` continua subindo só api+frontend.
  # Para incluir:  docker compose --profile whatsapp up -d
  #
  # ⚠️ NUNCA pareie o WhatsApp principal do escritório aqui. Use um chip dedicado.
  #    A Meta pode banir números que usam clientes não oficiais, e você perderia a
  #    linha comercial junto com todo o histórico de conversas com clientes.
  #
  # Não publicamos a porta no host: só o crm-api fala com este serviço, pela rede
  # interna do compose (EVOLUTION_BASE_URL=http://evolution-api:8080).
  # Para ler o QR code na primeira vez, use um túnel temporário:
  #    docker compose exec evolution-api sh   (ou publique 8080 só durante o pareamento)
  # ---------------------------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: cbc-evolution
    profiles: ["whatsapp"]
    expose:
      - "8080"
    environment:
      - SERVER_URL=http://evolution-api:8080
      # Chave que o crm-api envia no header `apikey`. Gere uma aleatória e longa.
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=false
      # Banco próprio do Evolution — separado do banco do CRM de propósito.
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_LOCAL_ENABLED=false
      # Só enviamos mensagens; não precisamos receber nada de volta.
      - WEBHOOK_GLOBAL_ENABLED=false
      - QRCODE_LIMIT=10
      - LOG_LEVEL=ERROR
    depends_on:
      - evolution-db
      - evolution-redis
    volumes:
      - evolution_instances:/evolution/instances
    restart: always

  evolution-db:
    image: postgres:16-alpine
    container_name: cbc-evolution-db
    profiles: ["whatsapp"]
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASSWORD}
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db:/var/lib/postgresql/data
    restart: always

  evolution-redis:
    image: redis:7-alpine
    container_name: cbc-evolution-redis
    profiles: ["whatsapp"]
    volumes:
      - evolution_redis:/data
    restart: always

  # Servidor Frontend Nginx para servir arquivos estáticos e encaminhar requisições da API para o backend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cbc-frontend
    # No Coolify NÃO publicamos porta no host: o proxy dele (porta 80/443) rotearia em
    # conflito. O domínio configurado no painel aponta para este serviço na porta 80
    # interna. Para rodar fora do Coolify (docker compose puro), troque por:
    #   ports: ["80:80"]
    expose:
      - "80"
    depends_on:
      - crm-api
    restart: always

volumes:
  evolution_instances:
  evolution_db:
  evolution_redis:
