version: '3.8'

services:
  # Servidor Backend Express (com inteligência artificial Gemini, parser de planilhas/PDFs, etc.)
  crm-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cbc-crm-api
    # NÃO publicamos a porta 3000 no host: o backend é acessado apenas internamente pela rede
    # docker (o nginx do serviço 'frontend' faz proxy para crm-api:3000). O único entrypoint
    # público é o nginx na porta 80, evitando dupla exposição e conflito de portas no host.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # Obrigatórias em produção (ver DEPLOY.md) — configure no painel do Coolify ou em um .env:
      - DATABASE_URL=${DATABASE_URL} # connection string do Supabase/Postgres (pooler, porta 6543)
      - SESSION_SECRET=${SESSION_SECRET} # string aleatória longa (>= 32 chars) para assinar sessões
      # Opcionais:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-} # só se quiser o motor Gemini; o OCR interno funciona sem
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    restart: always

  # ---------------------------------------------------------------------------
  # Evolution API — gateway de WhatsApp (NÃO OFICIAL, via WhatsApp Web/Baileys).
  #
  # ⚠️ NUNCA pareie o WhatsApp principal do escritório aqui. Use um chip dedicado.
  #    A Meta pode banir números que usam clientes não oficiais.
  #
  # ⚠️ O celular pareado precisa ficar LIGADO e conectado. Se ele passar cerca de
  #    14 dias offline, o WhatsApp derruba o dispositivo vinculado e os lembretes
  #    param. A tela de configuração mostra o estado da instância.
  #
  # A versão é cravada de propósito: com :latest, um redeploy qualquer pode trazer
  # uma versão que quebra a sessão pareada — e você descobriria pelo lembrete que
  # não chegou. Para atualizar, troque a tag conscientemente e refaça o pareamento
  # se necessário.
  #
  # Sem porta publicada: só o crm-api conversa com este serviço, pela rede interna
  # do compose, em http://evolution-api:8080.
  # ---------------------------------------------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: cbc-evolution
    expose:
      - "8080"
    environment:
      - SERVER_URL=http://evolution-api:8080
      # Chave que o crm-api envia no header `apikey`. Gere com: openssl rand -hex 32
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY2}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=false
      # Banco próprio do Evolution — separado do banco do CRM de propósito: se o
      # Evolution quebrar ou for removido, o CRM não é afetado.
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      # Não guardamos mensagens nem contatos: só enviamos lembretes, e guardar
      # conversas do chip aqui seria dado pessoal sem necessidade (LGPD).
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=cbc
      - CACHE_LOCAL_ENABLED=false
      # Só enviamos; não precisamos receber nada de volta.
      - WEBHOOK_GLOBAL_ENABLED=false
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false
    depends_on:
      - evolution-db
      - evolution-redis
    volumes:
      - evolution_instances:/evolution/instances
    restart: always

  # ---------------------------------------------------------------------------
  # Painel do Evolution — usado para criar a instância e ler o QR code.
  #
  # Atribua um domínio a ESTE serviço no painel do Coolify apenas durante o
  # pareamento, e REMOVA o domínio depois. Deixar exposto de forma permanente é
  # expor a porta de entrada do seu WhatsApp para a internet.
  # ---------------------------------------------------------------------------

  evolution-db:
    image: postgres:16-alpine
    container_name: cbc-evolution-db
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASSWORD}
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db:/var/lib/postgresql/data
    restart: always

  evolution-redis:
    image: redis:7-alpine
    container_name: cbc-evolution-redis
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    restart: always

  # Servidor Frontend Nginx para servir arquivos estáticos e encaminhar requisições da API para o backend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cbc-frontend
    # No Coolify NÃO publicamos porta no host: o proxy dele (porta 80/443) rotearia em
    # conflito. O domínio configurado no painel aponta para este serviço na porta 80
    # interna. Para rodar fora do Coolify (docker compose puro), troque por:
    #   ports: ["80:80"]
    expose:
      - "80"
    depends_on:
      - crm-api
    restart: always

volumes:
  evolution_instances:
  evolution_db:
  evolution_redis:
