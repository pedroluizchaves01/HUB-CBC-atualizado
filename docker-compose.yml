version: '3.8'

services:
  # Servidor Backend Express (com inteligência artificial Gemini, parser de planilhas/PDFs, etc.)
  crm-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cbc-crm-api
    # NÃO publicamos a porta 3000 no host: o backend é acessado apenas internamente pela rede
    # docker (o nginx do serviço 'frontend' faz proxy para crm-api:3000). O único entrypoint
    # público é o nginx na porta 80, evitando dupla exposição e conflito de portas no host.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # Obrigatórias em produção (ver DEPLOY.md) — configure no painel do Coolify ou em um .env:
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT} # JSON (em uma linha) da service account do Firebase
      - SESSION_SECRET=${SESSION_SECRET} # string aleatória longa (>= 32 chars) para assinar sessões
      # Opcionais:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-} # só se quiser o motor Gemini; o OCR interno funciona sem
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    restart: always

  # Servidor Frontend Nginx para servir arquivos estáticos e encaminhar requisições da API para o backend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cbc-frontend
    # No Coolify NÃO publicamos porta no host: o proxy dele (porta 80/443) rotearia em
    # conflito. O domínio configurado no painel aponta para este serviço na porta 80
    # interna. Para rodar fora do Coolify (docker compose puro), troque por:
    #   ports: ["80:80"]
    expose:
      - "80"
    depends_on:
      - crm-api
    restart: always
